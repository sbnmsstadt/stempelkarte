<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kreativ-Labor - Nachmittagsbetreuung</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Specific Styles for Kreativ-Labor */
        .lab-header {
            text-align: center;
            margin-bottom: 2rem;
            animation: fadeInDown 0.8s ease;
        }
        
        .lab-header h1 {
            background: linear-gradient(135deg, #d946ef, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .input-card {
            padding: 2rem;
            margin-bottom: 2rem;
            animation: fadeInUp 0.8s ease 0.1s backwards;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 600;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-family: inherit;
        }
        
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #d946ef;
            box-shadow: 0 0 10px rgba(217, 70, 239, 0.2);
        }

        .generate-btn {
            background: linear-gradient(135deg, #d946ef, #6366f1);
            color: white;
            border: none;
            padding: 1.2rem;
            width: 100%;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(217, 70, 239, 0.3);
        }

        .generate-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .ideas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .idea-card {
            text-align: left;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
            animation: bounceIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) backwards;
        }
        
        .idea-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: linear-gradient(to bottom, #d946ef, #6366f1);
            border-radius: 4px 0 0 4px;
        }

        .idea-tag {
            display: inline-block;
            background: rgba(217, 70, 239, 0.2);
            color: #fbd6ff;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .idea-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.8rem;
            color: white;
        }

        .idea-meta {
            display: flex;
            gap: 15px;
            font-size: 0.8rem;
            color: var(--primary-light);
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .idea-desc {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 1.5rem;
        }

        .action-row {
            display: flex;
            gap: 10px;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .back-nav {
            position: absolute;
            top: 20px;
            left: 20px;
        }
    </style>
</head>
<body>
    <div id="app" style="position: relative;">
        <!-- Back Button -->
        <button class="icon-btn back-nav" onclick="window.location.href='admin/index.html'">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>

        <header class="lab-header">
            <div class="brand-tag">NACHMI AI</div>
            <h1>Kreativ-Labor 🎨</h1>
            <p class="subtitle">Lass die KI spannende Projekte für die Kids entwerfen!</p>
        </header>

        <div class="glass-card input-card">
            <div class="form-group">
                <label>Thema / Stichwort</label>
                <input type="text" id="ai-topic" placeholder="z.B. Frühling, Dinosaurier, Recycling basteln...">
            </div>
            <div style="display:flex; gap:15px;">
                <div class="form-group" style="flex:1;">
                    <label>Altersgruppe</label>
                    <select id="ai-age">
                        <option value="6-10 Jahre">6 - 10 Jahre (VS)</option>
                        <option value="10-14 Jahre" selected>10 - 14 Jahre (MS)</option>
                        <option value="Gemischte Gruppe">Gemischte Gruppe</option>
                    </select>
                </div>
                <div class="form-group" style="flex:1;">
                    <label>Kategorie</label>
                    <select id="ai-interest">
                        <option value="Kreativität & Basteln">Kreativität & Basteln</option>
                        <option value="Bewegung & Sport">Bewegung & Sport</option>
                        <option value="Spannende Experimente">Experimente & Forschung</option>
                        <option value="Gruppenspiele">Gruppenspiele</option>
                    </select>
                </div>
            </div>
            
            <button id="gen-btn" class="generate-btn" onclick="generateIdeas()">
                <span>💡 Ideen generieren</span>
            </button>
        </div>

        <div id="ideas-container" class="ideas-grid">
            <!-- Ideas will be injected here -->
        </div>

    </div>

    <!-- Celebration/Toast Notification -->
    <div id="toast" class="view hidden" style="background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 10000; padding: 20px; position: fixed; top: 0; left: 0; right: 0; bottom: 0;">
        <div class="glass-card" style="text-align:center; max-width:400px; animation: bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);">
            <div style="font-size: 3rem; margin-bottom: 20px;">✅</div>
            <h2 style="color: var(--success); margin-bottom: 10px;">Erfolgreich!</h2>
            <p id="toast-text" style="color:var(--text-muted); margin-bottom: 20px;">Projekt zur Infotafel hinzugefügt.</p>
            <button onclick="closeToast()" class="add-stamp-btn" style="width:100%;">Super</button>
        </div>
    </div>

    <script src="kreativ.js"></script>
</body>
</html>
